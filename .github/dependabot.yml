version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /backup-verification
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]

  - package-ecosystem: pip
    directory: /rclone-migrate
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python:
        patterns: ["*"]
